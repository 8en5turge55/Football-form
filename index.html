<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Form Table</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #141414;
      --surface2:  #1c1c1c;
      --border:    rgba(255,255,255,0.08);
      --border2:   rgba(255,255,255,0.14);
      --text:      #f0f0ee;
      --muted:     #888;
      --accent:    #c8f04a;
      --accent-fg: #0d0d0d;
      --win:       #4ade80;
      --draw:      #888;
      --loss:      #f87171;
      --font:      'Crimson Pro', Georgia, serif;
      --mono:      'IBM Plex Mono', monospace;
      --radius:    6px;
      --radius-lg: 10px;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* Layout */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 2rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; }
    header span { font-size: 12px; color: var(--muted); font-family: var(--mono); }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0.6rem 2rem 4rem;
    }

    /* Top-level view nav */
    .view-nav {
      display: flex;
      gap: 0;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .view-tab {
      padding: 8px 18px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-size: 13px;
      font-family: var(--font);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
      margin-bottom: -1px;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Form window dropdown */
    .form-window-wrap {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: var(--muted); font-family: var(--mono);
    }
    #form-window-select {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 3px 7px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    #form-window-select:hover,
    #form-window-select:focus { border-color: var(--accent); }

    /* Testing toggle */
    .toggle-wrap {
      display: flex; align-items: center; gap: 8px;
      margin-left: 0; padding: 0 0 1px 0;
      font-size: 12px; color: var(--muted); font-family: var(--mono);
      cursor: pointer; user-select: none;
    }
    .toggle-wrap:hover { color: var(--text); }
    .toggle-track {
      position: relative; width: 32px; height: 18px;
      background: var(--border2); border-radius: 9px;
      transition: background 0.2s; flex-shrink: 0;
    }
    .toggle-track.on { background: var(--accent); }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 12px; height: 12px; border-radius: 50%;
      background: #fff; transition: left 0.2s;
    }
    .toggle-track.on .toggle-thumb { left: 17px; background: var(--accent-fg); }

    /* Testing date picker */
    .testing-date-wrap {
      display: flex; align-items: center; gap: 7px;
      margin-left: 12px; padding-left: 12px;
      border-left: 1px solid var(--border2);
      font-size: 12px; color: var(--muted); font-family: var(--mono);
    }
    .testing-date-wrap label { white-space: nowrap; }
    #testing-date {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 3px 7px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    #testing-date:hover, #testing-date:focus { border-color: var(--accent); }
    #testing-date::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
    #testing-apply {
      padding: 3px 10px;
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #testing-apply:hover { opacity: 0.85; }

    /* League tabs */
    .tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .tab-group { display: flex; flex-direction: column; gap: 5px; }

    .tab-group-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .tab {
      padding: 5px 13px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .tab:hover { border-color: var(--border2); color: var(--text); }
    .tab.active {
      background: var(--accent); color: var(--accent-fg);
      border-color: var(--accent); font-weight: 600;
    }

    /* Legend */
    .legend {
      display: flex; flex-wrap: wrap;
      gap: 8px 16px; margin-bottom: 1.25rem; min-height: 22px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); font-family: var(--mono); }
    .swatch { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left; padding: 7px 10px;
      color: var(--muted); font-weight: 400; font-size: 11px;
      font-family: var(--mono); letter-spacing: 0.06em; text-transform: uppercase;
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    th.r, td.r { text-align: right; }
    td {
      padding: 5px 10px; border-bottom: 1px solid var(--border);
      vertical-align: middle; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; max-width: 0;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .col-rank { width: 42px; }
    .col-team { width: 170px; min-width: 130px; }
    .col-pts  { width: 44px; }
    .col-wdl  { width: 36px; }
    .col-form { width: 100px; }
    .col-fix  { width: auto; min-width: 180px; }

    .rank     { color: var(--muted); font-family: var(--mono); font-size: 11px; }
    .team-name{ font-weight: 500; color: var(--text); }
    .pts-val  { font-family: var(--mono); font-weight: 600; color: var(--accent); }
    .wdl-val  { font-family: var(--mono); color: var(--muted); font-size: 12px; }

    /* Form dots */
    .dots { display: flex; gap: 3px; align-items: center; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-w { background: var(--win); }
    .dot-d { background: var(--draw); }
    .dot-l { background: var(--loss); }

    /* Result pill */
    .fix-result {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      white-space: nowrap;
    }
    .fix-result-score {
      padding: 1px 6px; border-radius: 4px;
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text); letter-spacing: 0.04em;
    }
    .fix-result-winner { color: var(--accent); font-size: 11px; }
    .fix-result-draw   { color: var(--muted);  font-size: 11px; }

    /* Fixture badge */
    .fix-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 8px; border-radius: 20px;
      font-size: 11px; font-family: var(--mono); font-weight: 500;
      white-space: nowrap; border: 1px solid transparent;
    }
    .fix-ha { font-size: 10px; opacity: 0.7; font-weight: 400; }

    /* Form key */

    /* Best Bets */
    .bets-header {
      font-size: 12px; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.7;
      border-left: 2px solid var(--border2); padding-left: 10px;
    }
    .bets-loading { padding: 2rem 0; color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 8px; }
    .bets-empty   { padding: 2rem 0; color: var(--muted); font-size: 13px; }
    .bet-card {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      gap: 5px 16px;
      align-items: center;
      padding: 14px 14px 14px 16px;
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-lg);
      margin-bottom: 10px;
      background: var(--surface);
      transition: background 0.12s;
    }
    .bet-card:hover { background: var(--surface2); }
    .bet-matchup {
      font-size: 14px; font-weight: 600; color: var(--text);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      grid-column: 1; grid-row: 1;
    }
    .bet-away { color: var(--muted); font-weight: 400; }
    .bet-vs   { font-size: 11px; color: var(--muted); font-weight: 400; }
    .bet-meta {
      display: flex; gap: 10px; font-size: 12px; color: var(--muted);
      font-family: var(--mono); flex-wrap: wrap; align-items: center;
      grid-column: 1; grid-row: 2;
    }
    .bet-right {
      grid-column: 2; grid-row: 1 / 3;
      display: flex; flex-direction: column; align-items: flex-end; gap: 5px;
    }
    .bet-league { font-size: 11px; color: var(--muted); font-family: var(--mono); white-space: nowrap; }
    .bet-diff {
      display: inline-block; padding: 2px 8px;
      background: rgba(200,240,74,0.12); border: 1px solid rgba(200,240,74,0.25);
      border-radius: 20px; font-size: 11px; font-family: var(--mono); color: var(--accent);
      white-space: nowrap;
    }
    .bet-dots { display: flex; gap: 3px; align-items: center; }

    /* Date section separator */
    .bet-date-section { margin: 1.25rem 0 0.5rem; }
    .bet-date-heading {
      font-size: 11px; font-family: var(--mono); letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted);
      border-bottom: 1px solid var(--border); padding-bottom: 4px; margin-bottom: 8px;
    }

    /* Analytics */
    .bets-analytics {
      margin-top: 1.5rem;
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      background: var(--surface);
    }
    .bets-analytics-title {
      font-size: 11px; font-family: var(--mono); letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    }
    .bets-analytics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }
    .bets-stat {
      display: flex; flex-direction: column; gap: 2px;
    }
    .bets-stat-val {
      font-size: 22px; font-weight: 700; color: var(--accent); font-family: var(--font);
    }
    .bets-stat-label {
      font-size: 11px; color: var(--muted); font-family: var(--mono);
    }
    .bets-stat-sub {
      font-size: 11px; color: var(--muted); font-family: var(--mono);
    }

    /* Status / error */
    .status {
      padding: 2rem 0; color: var(--muted); font-size: 13px;
      display: flex; align-items: center; gap: 8px;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border2); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      padding: 1rem; border: 1px solid rgba(248,113,113,0.3);
      border-radius: var(--radius-lg); color: var(--loss);
      font-size: 13px; background: rgba(248,113,113,0.05);
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 1rem 2rem; font-size: 11px; color: var(--muted);
      font-family: var(--mono); display: flex;
      justify-content: space-between; flex-wrap: wrap; gap: 4px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      header { padding: 1rem; }
      .container { padding: 1rem 1rem 3rem; }
      footer { padding: 1rem; }
      .col-team { width: 120px; }
      .col-wdl  { display: none; }
      .bet-right { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .spinner { animation: none; opacity: 0.5; }
    }
  </style>
</head>
<body>

<header>
  <h1>Football Form Table</h1>
  
</header>

<main class="container">

  <!-- Top-level view switcher -->
  <nav class="view-nav">
    <button class="view-tab active" id="nav-leagues" onclick="showView('leagues')">Form Tables</button>
    <button class="view-tab"        id="nav-bets"    onclick="showView('bets')">💷 Best Bets</button>
    <div class="form-window-wrap" style="margin-left:auto;margin-right:12px">
      <label for="form-window-select">Form</label>
      <select id="form-window-select">
        <option value="8">Last 8</option>
        <option value="6">Last 6</option>
        <option value="4">Last 4</option>
      </select>
    </div>
    <!-- Form Tables date picker: always visible on leagues tab -->
    <div class="testing-date-wrap" id="leagues-date-wrap">
      <label for="leagues-date">Date</label>
      <input type="date" id="leagues-date" />
    </div>
    <!-- Best Bets: test mode toggle + date range (only on bets tab) -->
    <label class="toggle-wrap" id="testing-toggle" style="display:none" title="Testing mode">
      <span>Test Mode</span>
      <div class="toggle-track" id="testing-track">
        <div class="toggle-thumb"></div>
      </div>
    </label>
    <div id="bets-date-wrap" style="display:none">
      <div id="bets-live-controls" style="display:none">
        <!-- nothing extra in live mode -->
      </div>
      <div id="bets-test-controls" style="display:none">
        <div class="testing-date-wrap">
          <label for="bets-date-from">From</label>
          <input type="date" id="bets-date-from" />
          <label for="bets-date-to" style="margin-left:8px">To</label>
          <input type="date" id="bets-date-to" />
          <button id="testing-apply">Apply</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- League Tables view -->
  <div id="view-leagues">
    <div class="tabs" id="tabs"></div>

    <div id="content">
      <div class="status"><span class="spinner"></span> Loading data…</div>
    </div>
  </div>

  <!-- Best Bets view -->
  <div id="view-bets" style="display:none">
    <p class="bets-header">
      Teams in the <strong style="color:var(--text)">top 3</strong> of their league form table (<span id="bets-form-label">last 8</span>),
      whose next fixture is at <strong style="color:#4ade80">HOME</strong> or <strong style="color:#60a5fa">AWAY</strong> against a team in the <strong style="color:var(--text)">bottom 3</strong>.
      Sorted by form points gap, highest first.
    </p>
    <div id="bets-content">
      <div class="status"><span class="spinner"></span> Loading all leagues…</div>
    </div>
  </div>

</main>

<footer>
  <span>Data: football-data.org</span>
  <span id="last-updated"></span>
  <span style="color:var(--border2)">v1.57</span>
</footer>

<script>
const BASE = 'https://football-proxy.bensturgess83.workers.dev';

const LEAGUE_GROUPS = [
  {
    label: 'England',
    leagues: [
      { code: 'PL',  label: 'Premier League' },
      { code: 'ELC', label: 'Championship'   },
    ],
  },
  {
    label: 'Europe',
    leagues: [
      { code: 'PD',  label: 'La Liga'       },
      { code: 'BL1', label: 'Bundesliga'    },
      { code: 'SA',  label: 'Serie A'       },
      { code: 'FL1', label: 'Ligue 1'       },
      { code: 'DED', label: 'Eredivisie'    },
      { code: 'PPL', label: 'Primeira Liga' },
    ],
  },
  {
    label: 'South America',
    leagues: [
      { code: 'BSA', label: 'Brasileirão'   },
    ],
  },
];

const LEAGUES = LEAGUE_GROUPS.flatMap(g => g.leagues);

const PAIR_COLORS = [
  { bg: 'rgba(255,80,80,0.15)',   border: 'rgba(255,80,80,0.4)',   text: '#ff6b6b' },  // red
  { bg: 'rgba(80,180,255,0.15)',  border: 'rgba(80,180,255,0.4)',  text: '#4db8ff' },  // sky blue
  { bg: 'rgba(80,230,140,0.15)',  border: 'rgba(80,230,140,0.4)',  text: '#40d98a' },  // green
  { bg: 'rgba(255,180,0,0.15)',   border: 'rgba(255,180,0,0.4)',   text: '#ffb800' },  // amber
  { bg: 'rgba(190,80,255,0.15)',  border: 'rgba(190,80,255,0.4)',  text: '#c44dff' },  // purple
  { bg: 'rgba(255,140,0,0.15)',   border: 'rgba(255,140,0,0.4)',   text: '#ff8c00' },  // orange
];

let currentLeague = 'PL';
let currentView   = 'leagues';
let formWindow    = 8; // number of matches to consider for form
const cache = {};

// Global request queue — serialises ALL API calls with 7s minimum gap
// This is the single source of rate limiting; the Worker just proxies
let _lastApiCall = 0;
let _apiQueue = Promise.resolve();

async function apiFetch(path) {
  // Chain onto the global queue so requests never overlap
  const result = await (_apiQueue = _apiQueue.then(async () => {
    const now = Date.now();
    const wait = Math.max(0, _lastApiCall + 7000 - now);
    if (wait > 0) await new Promise(r => setTimeout(r, wait));
    _lastApiCall = Date.now();
    const res = await fetch(BASE + path);
    if (!res.ok) throw new Error(`API returned ${res.status} for ${path}`);
    return res.json();
  }));
  return result;
}

// Returns the as-of date for the form tables tab (always from leagues-date picker)
function getLeaguesAsOf() {
  const val = document.getElementById('leagues-date').value;
  return val ? new Date(val + 'T23:59:59Z') : new Date();
}

// Returns the as-of date for best bets (today when not in test mode)
function getAsOfDate() {
  return new Date();
}

// Raw match data cache (separate from processed cache so we can reprocess for different dates)
const rawCache = {};

// Derive the season start year for a given date.
// European seasons typically kick off in late July, so July onwards = new season year.
function seasonYearForDate(date) {
  const yr = date.getFullYear();
  const mo = date.getMonth() + 1; // 1-indexed
  return mo >= 7 ? yr : yr - 1;
}

async function fetchRaw(code, asOf) {
  const season   = seasonYearForDate(asOf);
  const cacheKey = code + '_s' + season;
  if (rawCache[cacheKey]) return rawCache[cacheKey];

  // Always fetch the derived season — don't fall back, even if no finished matches yet.
  // In pre-season (e.g. July) the new season has only scheduled matches; that's correct.
  // For test mode with a historical date, the derived season will have finished matches.
  let standData, allMatchData;
  try {
    [standData, allMatchData] = await Promise.all([
      apiFetch(`/competitions/${code}/standings?season=${season}`),
      apiFetch(`/competitions/${code}/matches?season=${season}`),
    ]);
  } catch(e) {
    // If the season isn't available yet, try the previous one as a last resort
    try {
      [standData, allMatchData] = await Promise.all([
        apiFetch(`/competitions/${code}/standings?season=${season - 1}`),
        apiFetch(`/competitions/${code}/matches?season=${season - 1}`),
      ]);
    } catch(e2) {
      throw new Error(`Could not load data for ${code}: ${e2.message}`);
    }
  }

  rawCache[cacheKey] = { standData, allMatchData };
  return rawCache[cacheKey];
}

async function loadLeague(code, asOfDate) {
  const asOf     = asOfDate instanceof Date ? asOfDate : getAsOfDate();
  const cacheKey = code + '_' + asOf.toISOString().slice(0, 10) + '_w' + formWindow;
  if (cache[cacheKey]) return cache[cacheKey];

  const { standData, allMatchData } = await fetchRaw(code, asOf);
  const allMatches = allMatchData.matches || [];

  // Build team list from standings (for names/ids) but recalculate all stats from match history
  const teams = standData.standings[0].table.map(row => ({
    id:      row.team.id,
    name:    row.team.shortName || row.team.name,
    pts:     0,   // will be recalculated from matches
    played:  0,
    won:     0,
    drawn:   0,
    lost:    0,
    gf:      0,
    ga:      0,
    results: [],
    formPts: 0,
    formW:   0,
    formD:   0,
    formL:   0,
  }));

  const teamMap = Object.fromEntries(teams.map(t => [t.id, t]));

  // All finished matches up to asOf — sorted newest first for form, oldest first for standings
  const finishedBeforeAsOf = allMatches
    .filter(m => m.status === 'FINISHED' && new Date(m.utcDate) <= asOf)
    .sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate));

  // Rebuild full season standings from match history
  for (const m of finishedBeforeAsOf) {
    const h  = teamMap[m.homeTeam.id];
    const a  = teamMap[m.awayTeam.id];
    const hg = m.score?.fullTime?.home;
    const ag = m.score?.fullTime?.away;
    if (!h || !a || hg === null || hg === undefined) continue;

    h.played++; a.played++;
    h.gf += hg; h.ga += ag;
    a.gf += ag; a.ga += hg;

    if (hg > ag)      { h.won++;   h.pts += 3; a.lost++; }
    else if (hg < ag) { a.won++;   a.pts += 3; h.lost++; }
    else              { h.drawn++; h.pts += 1; a.drawn++; a.pts += 1; }

    // Last 8 form (array is already newest-first due to sort)
    if (h.results.length < formWindow) h.results.push(hg > ag ? 'W' : hg < ag ? 'L' : 'D');
    if (a.results.length < formWindow) a.results.push(ag > hg ? 'W' : ag < hg ? 'L' : 'D');
  }

  for (const t of teams) {
    for (const r of t.results) {
      if (r === 'W') { t.formPts += 3; t.formW++; }
      else if (r === 'D') { t.formPts += 1; t.formD++; }
      else t.formL++;
    }
  }

  // Next fixture for each team: first match after asOf (any status — may now be finished)
  const upcoming = allMatches
    .filter(m => new Date(m.utcDate) > asOf)
    .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

  // Build a lookup of finished results by team pair
  const resultByPair = {};
  for (const m of allMatches) {
    if (m.status !== 'FINISHED') continue;
    const hg = m.score?.fullTime?.home;
    const ag = m.score?.fullTime?.away;
    if (hg === null || hg === undefined) continue;
    const key = [m.homeTeam.id, m.awayTeam.id].join('-');
    resultByPair[key] = { hg, ag, homeId: m.homeTeam.id, awayId: m.awayTeam.id };
  }

  const nextRound = {};
  const seen = new Set();
  for (const m of upcoming) {
    const hid = m.homeTeam.id, aid = m.awayTeam.id;
    if (seen.has(hid) || seen.has(aid)) continue;
    if (teamMap[hid] && teamMap[aid]) {
      // Check if this match has since been played (status FINISHED)
      const resultKey = [hid, aid].join('-');
      const result = m.status === 'FINISHED' ? resultByPair[resultKey] : null;
      const entry = { opp: aid, home: true,  date: m.utcDate, result };
      nextRound[hid] = entry;
      nextRound[aid] = { opp: hid, home: false, date: m.utcDate, result };
      seen.add(hid); seen.add(aid);
    }
  }

  const data = { teams, teamMap, nextRound, fetched: new Date(), asOf };
  cache[cacheKey] = data;
  return data;
}

/* ── Result HTML helper ── */
function resultHtml(fix, teamId, teamMap) {
  if (!fix || !fix.result) return '';
  const r   = fix.result;
  const hg  = r.hg, ag = r.ag;
  const isHome = fix.home;
  const myScore  = isHome ? hg : ag;
  const oppScore = isHome ? ag : hg;
  let winnerHtml;
  if (hg > ag) {
    const winnerName = teamMap[r.homeId]?.name || '';
    winnerHtml = isHome
      ? `<span class="fix-result-winner">W</span>`
      : `<span class="fix-result-draw">L</span>`;
  } else if (ag > hg) {
    winnerHtml = isHome
      ? `<span class="fix-result-draw">L</span>`
      : `<span class="fix-result-winner">W</span>`;
  } else {
    winnerHtml = `<span class="fix-result-draw">D</span>`;
  }
  return `<span class="fix-result">
    ${winnerHtml}
    <span class="fix-result-score">${hg} – ${ag}</span>
  </span>`;
}

/* ── League table renderer ── */
function render(code, data) {
  updateFormKeyLabel();
  const { teams, teamMap, nextRound } = data;
  const sorted = [...teams].sort((a, b) => b.formPts - a.formPts || b.pts - a.pts);

  const pairColor   = {};
  const legendPairs = [];
  const usedPairs   = new Set();
  let ci = 0;

  // Only colour top 3 + their opponents, and bottom 3 + their opponents
  const n        = sorted.length;
  const top3ids  = new Set(sorted.slice(0, 3).map(t => t.id));
  const bot3ids  = new Set(sorted.slice(Math.max(0, n - 3)).map(t => t.id));
  const priority = new Set([...top3ids, ...bot3ids]);

  // First pass: pairs where at least one team is in top3 or bottom3
  for (const [tidStr, fix] of Object.entries(nextRound)) {
    const tid = +tidStr;
    if (!priority.has(tid)) continue;
    const key = [tid, fix.opp].sort().join('-');
    if (usedPairs.has(key)) continue;
    usedPairs.add(key);
    const c = PAIR_COLORS[ci % PAIR_COLORS.length];
    pairColor[tid]     = c;
    pairColor[fix.opp] = c;
    const t1 = teamMap[tid], t2 = teamMap[fix.opp];
    if (t1 && t2) legendPairs.push({ label: `${t1.name} v ${t2.name}`, c });
    ci++;
  }



  const rows = sorted.map((t, i) => {
    const dots = [...t.results].reverse().map(r => {
      const cls   = r === 'W' ? 'dot-w' : r === 'D' ? 'dot-d' : 'dot-l';
      const label = r === 'W' ? 'Win'   : r === 'D' ? 'Draw'  : 'Loss';
      return `<span class="dot ${cls}" title="${label}"></span>`;
    }).join('');

    let badge = '<span style="color:var(--muted)">—</span>';
    const fix = nextRound[t.id];
    const c   = pairColor[t.id];
    if (fix && c) {
      const opp     = teamMap[fix.opp];
      const ha      = fix.home ? 'H' : 'A';
      const dateStr = new Date(fix.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      const resHtml = resultHtml(fix, t.id, teamMap);
      if (opp) badge = `<span class="fix-badge" style="background:${c.bg};border-color:${c.border};color:${c.text}">
        <span class="fix-ha">${ha}</span>${opp.name}<span class="fix-ha">· ${dateStr}</span>
      </span>${resHtml ? ' ' + resHtml : ''}`;
    }

    const rankStyle = c
      ? `style="border-left:3px solid ${c.text};background:${c.bg}"`
      : `style="border-left:3px solid transparent"`;
    const teamStyle = c ? `style="background:${c.bg}"` : '';

    return `<tr>
      <td class="col-rank" ${rankStyle}><span class="rank">${i + 1}</span></td>
      <td class="col-team" ${teamStyle}><span class="team-name">${t.name}</span></td>
      <td class="col-pts r"><span class="pts-val">${t.formPts}</span></td>
      <td class="col-wdl r"><span class="wdl-val">${t.formW}</span></td>
      <td class="col-wdl r"><span class="wdl-val">${t.formD}</span></td>
      <td class="col-wdl r"><span class="wdl-val">${t.formL}</span></td>
      <td class="col-form"><div class="dots">${dots || '<span style="color:var(--muted);font-size:11px">no data</span>'}</div></td>
      <td class="col-fix">${badge}</td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th class="col-rank">#</th>
          <th class="col-team">Team</th>
          <th class="col-pts r" title="Form points from last 8 matches">Pts</th>
          <th class="col-wdl r">W</th>
          <th class="col-wdl r">D</th>
          <th class="col-wdl r">L</th>
          <th class="col-form" id="form-col-header">Last 8</th>
          <th class="col-fix">Next fixture</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  const today = new Date().toISOString().slice(0, 10);
  const dataDay = data.asOf.toISOString().slice(0, 10);
  const asOfLabel = dataDay !== today
    ? ' · As of ' + data.asOf.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
    : '';
  document.getElementById('last-updated').textContent =
    'Updated ' + data.fetched.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) + asOfLabel;
}

  return `

/* ── Analytics HTML builder ── */
function analyticsHtml(bets) {
  const total = bets.length;
  if (total === 0) return '';
  let winners = 0, homeWins = 0, awayWins = 0;
  let totalHome = 0, totalAway = 0;
  for (const b of bets) {
    if (b.isHome) totalHome++; else totalAway++;
    if (!b.fix || !b.fix.result) continue;
    const r = b.fix.result;
    const qualWon = b.isHome ? r.hg > r.ag : r.ag > r.hg;
    if (qualWon) {
      winners++;
      if (b.isHome) homeWins++; else awayWins++;
    }
  }
  const pct      = (n, d) => d > 0 ? Math.round(n / d * 100) : 0;
  const withRes  = bets.filter(b => b.fix?.result).length;
  return `
  <div class="bets-analytics">
    <div class="bets-analytics-title">Analytics · ${withRes} of ${total} bets have results</div>
    <div class="bets-analytics-grid">
      <div class="bets-stat">
        <span class="bets-stat-val">${total}</span>
        <span class="bets-stat-label">Total Best Bets</span>
        <span class="bets-stat-sub">${totalHome} home · ${totalAway} away</span>
      </div>
      <div class="bets-stat">
        <span class="bets-stat-val">${winners}</span>
        <span class="bets-stat-label">Total Winners</span>
        <span class="bets-stat-sub">${pct(winners, withRes)}% of bets with results</span>
      </div>
      <div class="bets-stat">
        <span class="bets-stat-val">${homeWins}</span>
        <span class="bets-stat-label">Home Winners</span>
        <span class="bets-stat-sub">${pct(homeWins, totalHome)}% of home best bets</span>
      </div>
      <div class="bets-stat">
        <span class="bets-stat-val">${awayWins}</span>
        <span class="bets-stat-label">Away Winners</span>
        <span class="bets-stat-sub">${pct(awayWins, totalAway)}% of away best bets</span>
      </div>
    </div>
  </div>`;
}

function renderBetsDateRange(betsByDate, fromDate, toDate) {

  if (allDates.length === 0) {

function pushRangeBet(betsByDate, m, qualTeam, opponent, isHome, sorted, teamMap, leagueLabel) {
  const fixDate  = new Date(m.utcDate);
  const fixDay   = fixDate.toISOString().slice(0, 10);
  const qualRank = sorted.findIndex(t => t.id === qualTeam.id) + 1;
  const oppRank  = sorted.findIndex(t => t.id === opponent.id) + 1;
  const ptsDiff  = qualTeam.formPts - opponent.formPts;
  const dateStr  = fixDate.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
  const homeTeam = isHome ? qualTeam : opponent;
  const awayTeam = isHome ? opponent : qualTeam;
  const dots = [...qualTeam.results].reverse().map(r => {
    const cls = r === 'W' ? 'dot-w' : r === 'D' ? 'dot-d' : 'dot-l';
    return `<span class="dot ${cls}" title="${r}"></span>`;
  }).join('');
  // Build fix object matching the shape used elsewhere
  const hg = m.score?.fullTime?.home;
  const ag = m.score?.fullTime?.away;
  const result = (m.status === 'FINISHED' && hg !== null && hg !== undefined)
    ? { hg, ag, homeId: m.homeTeam.id, awayId: m.awayTeam.id }
    : null;
  const fix = { date: m.utcDate, home: isHome, opp: opponent.id, result };
  if (!betsByDate[fixDay]) betsByDate[fixDay] = [];
  // Avoid duplicates
  const key = fixDay + qualTeam.id;
  if (!betsByDate[fixDay].some(b => b._key === key)) {
    betsByDate[fixDay].push({ qualTeam, opponent, homeTeam, awayTeam, isHome, qualRank, oppRank, ptsDiff, dateStr, fixDay, dots, leagueLabel, fix, teamMap, _key: key });
  }
}

async function loadBets() {
  const el = document.getElementById('bets-content');
  const totalLeagues = LEAGUES.length;
  let loadedCount = 0;
  let needsFetch = LEAGUES.some(({ code }) => !Object.keys(rawCache).some(k => k.startsWith(code + '_s')));
  const updateProgress = () => {
    el.innerHTML = needsFetch
      ? `<div class="status"><span class="spinner"></span> Loading leagues… ${loadedCount}/${totalLeagues}</div>`
      : `<div class="status"><span class="spinner"></span> Calculating…</div>`;
  };
  updateProgress(); // always clear and show spinner before processing

  if (testingMode) {
    // Date range mode: load each league as-of the day BEFORE fromDate (form state at range start),
    // then find all fixtures within the range where top3 plays bottom3
    const fromVal = document.getElementById('bets-date-from').value;
    const toVal   = document.getElementById('bets-date-to').value;
    if (!fromVal || !toVal) {
      el.innerHTML = '<p class="bets-empty">Please select a From and To date.</p>';
      return;
    }
    const fromDate = new Date(fromVal + 'T00:00:00Z');
    const toDate   = new Date(toVal   + 'T23:59:59Z');
    // Snapshot these immediately before any async calls
    const fromDateSnap = new Date(fromDate);
    const toDateSnap   = new Date(toDate);
    if (fromDateSnap > toDateSnap) {
      el.innerHTML = '<p class="bets-empty">From date must be before To date.</p>';
      return;
    }

    const betsByDate = {};

    // For each league, get raw match data then evaluate each fixture in the range
    // using the form table as-of the day BEFORE that specific fixture
    for (const { code, label } of LEAGUES) {
      // Prime rawCache for this league — only if not already cached
      // Stagger 7s between leagues to respect 10 req/min rate limit (2 calls per league)
      const primeAsOf = new Date(fromDate.getTime() - 1000);
      const rawAlreadyCached = Object.keys(rawCache).some(k => k.startsWith(code + '_s'));
      if (!rawAlreadyCached) {
        try {
          await loadLeague(code, primeAsOf);
        } catch(e) {
          loadedCount++;
          if (loadedCount < totalLeagues) updateProgress();
          continue;
        }
      }
      loadedCount++;
      if (loadedCount < totalLeagues) updateProgress();

      // Get the season that covers the FROM date — this is the key season for this range
      const fromSeason = seasonYearForDate(fromDateSnap);
      const toSeason   = seasonYearForDate(toDateSnap);

      // Ensure we have raw data for all seasons covered by the range
      const seasonsNeeded = [...new Set([fromSeason, toSeason])];
      let allMatches = [];
      let standData  = null;
      for (const yr of seasonsNeeded) {
        const rk = code + '_s' + yr;
        if (!rawCache[rk]) {
          try { await loadLeague(code, new Date((yr + 1) + '-01-01T00:00:00Z')); } catch { continue; }
        }
        if (rawCache[rk]) {
          if (!standData) standData = rawCache[rk].standData;
          allMatches = allMatches.concat(rawCache[rk].allMatchData.matches || []);
        }
      }
      // Also check any other cached seasons for this league
      Object.keys(rawCache).filter(k => k.startsWith(code + '_s')).forEach(rk => {
        const existing = rawCache[rk].allMatchData.matches || [];
        const newOnes  = existing.filter(m => !allMatches.some(x => x.id === m.id));
        allMatches = allMatches.concat(newOnes);
        if (!standData) standData = rawCache[rk].standData;
      });
      if (!standData || allMatches.length === 0) continue;

      // Filter matches that fall within the selected date range
      const rangeMatches = allMatches.filter(m => {
        const d = new Date(m.utcDate);
        return d >= fromDateSnap && d <= toDateSnap;
      });

      // For each match in range, recalculate form as-of the day before that match
      for (const m of rangeMatches) {
        const matchDate = new Date(m.utcDate);
        const dayBefore = new Date(matchDate.getTime() - 24 * 60 * 60 * 1000);
        dayBefore.setUTCHours(23, 59, 59, 999);

        // Build form table as of dayBefore from raw match history
        const teams = standData.standings[0].table.map(row => ({
          id:      row.team.id,
          name:    row.team.shortName || row.team.name,
          pts:     0, played: 0, won: 0, drawn: 0, lost: 0,
          results: [], formPts: 0, formW: 0, formD: 0, formL: 0,
        }));
        const teamMap = Object.fromEntries(teams.map(t => [t.id, t]));

        const finishedBefore = allMatches
          .filter(mx => mx.status === 'FINISHED' && new Date(mx.utcDate) <= dayBefore)
          .sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate));

        for (const mx of finishedBefore) {
          const h = teamMap[mx.homeTeam.id], a = teamMap[mx.awayTeam.id];
          const hg = mx.score?.fullTime?.home, ag = mx.score?.fullTime?.away;
          if (!h || !a || hg === null || hg === undefined) continue;
          h.played++; a.played++;
          if (hg > ag)      { h.won++;   h.pts += 3; a.lost++; }
          else if (hg < ag) { a.won++;   a.pts += 3; h.lost++; }
          else              { h.drawn++; h.pts += 1; a.drawn++; a.pts += 1; }
          if (h.results.length < formWindow) h.results.push(hg > ag ? 'W' : hg < ag ? 'L' : 'D');
          if (a.results.length < formWindow) a.results.push(ag > hg ? 'W' : ag < hg ? 'L' : 'D');
        }
        for (const t of teams) {
          for (const r of t.results) {
            if (r === 'W') { t.formPts += 3; t.formW++; }
            else if (r === 'D') { t.formPts += 1; t.formD++; }
            else t.formL++;
          }
        }

        const allZeroForm = teams.every(t => t.formPts === 0);
        const sorted = [...teams].sort((a, b) =>
          allZeroForm ? b.pts - a.pts : b.formPts - a.formPts || b.pts - a.pts
        );
        const n = sorted.length;
        if (n < 6) continue;
        const top3Set    = new Set(sorted.slice(0, 3).map(t => t.id));
        const bottom3Set = new Set(sorted.slice(n - 3).map(t => t.id));

        const hid = m.homeTeam.id, aid = m.awayTeam.id;
        const home = teamMap[hid], away = teamMap[aid];
        if (!home || !away) continue;

        if (top3Set.has(hid) && bottom3Set.has(aid)) {
          pushRangeBet(betsByDate, m, home, away, true, sorted, teamMap, label);
        }
        if (top3Set.has(aid) && bottom3Set.has(hid)) {
          pushRangeBet(betsByDate, m, away, home, false, sorted, teamMap, label);
        }
      }
    }
    await new Promise(r => setTimeout(r, 50)); // yield to browser to paint spinner
    renderBetsDateRange(betsByDate, fromDateSnap, toDateSnap);
  } else {
    // Live mode: single as-of date (today)
    const asOf = getAsOfDate();
    const cacheKey = (code) => code + '_' + asOf.toISOString().slice(0, 10) + '_w' + formWindow;
    const results = [];
    for (const { code, label } of LEAGUES) {
      try {
        const data = await loadLeague(code, asOf);
        results.push({ code, label, data });
      } catch {
        results.push({ code, label, data: null });
      }
      loadedCount++;
      if (loadedCount < totalLeagues) updateProgress();
    }
    renderBets(collectBets(results, asOf), false);
  }
}

// Extract qualifying bets from league data for a given asOf date
function collectBets(allLeagueData, asOf) {
  const bets = [];
  for (const { code, label, data } of allLeagueData) {
    if (!data) continue;
    const { teams, teamMap, nextRound } = data;
    const allZeroForm = teams.every(t => t.formPts === 0);
    const sorted = [...teams].sort((a, b) =>
      allZeroForm
        ? b.pts - a.pts   // pre-season: fall back to standings order
        : b.formPts - a.formPts || b.pts - a.pts
    );
    const n = sorted.length;
    if (n < 6) continue;
    const bottom3Set = new Set(sorted.slice(n - 3).map(t => t.id));
    const top3       = sorted.slice(0, 3);
    for (const qualTeam of top3) {
      const fix = nextRound[qualTeam.id];
      if (!fix) continue;
      if (!bottom3Set.has(fix.opp)) continue;
      const opponent = teamMap[fix.opp];
      if (!opponent) continue;
      const fixDate = new Date(fix.date);
      const fixDay  = fixDate.toISOString().slice(0, 10);
      const isHome  = fix.home;
      const qualRank = sorted.findIndex(t => t.id === qualTeam.id) + 1;
      const oppRank  = sorted.findIndex(t => t.id === opponent.id) + 1;
      const ptsDiff  = qualTeam.formPts - opponent.formPts;
      const dateStr  = fixDate.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
      const dots = [...qualTeam.results].reverse().map(r => {
        const cls = r === 'W' ? 'dot-w' : r === 'D' ? 'dot-d' : 'dot-l';
        return `<span class="dot ${cls}" title="${r}"></span>`;
      }).join('');
      const homeTeam = isHome ? qualTeam : opponent;
      const awayTeam = isHome ? opponent : qualTeam;
      bets.push({ qualTeam, opponent, homeTeam, awayTeam, isHome, qualRank, oppRank, ptsDiff, dateStr, fixDay, dots, leagueLabel: label, code, fix, teamMap });
    }
  }
  return bets;
}

/* ── League switcher ── */
async function switchLeague(code) {
  currentLeague = code;
  document.querySelectorAll('.tab-group-btns .tab').forEach(t =>
    t.classList.toggle('active', t.dataset.code === code)
  );
  const asOf     = getLeaguesAsOf();
  const cacheKey = code + '_' + asOf.toISOString().slice(0, 10) + '_w' + formWindow;
  if (!cache[cacheKey]) {
    document.getElementById('content').innerHTML =
      '<div class="status"><span class="spinner"></span> Loading data…</div>';
  }
  try {
    const data = await loadLeague(code, asOf);
    render(code, data);
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="error">
        <strong>Couldn't load data.</strong><br>${e.message}<br><br>
        Check your API key or try again — free tier allows 10 requests/min.
       </div>`;
  }
}

/* ── Build league tabs ── */
const tabsEl = document.getElementById('tabs');
LEAGUE_GROUPS.forEach(group => {
  const groupWrap = document.createElement('div');
  groupWrap.className = 'tab-group';



  const groupBtns = document.createElement('div');
  groupBtns.className = 'tab-group-btns';
  group.leagues.forEach(l => {
    const btn = document.createElement('button');
    btn.className    = 'tab' + (l.code === currentLeague ? ' active' : '');
    btn.textContent  = l.label;
    btn.dataset.code = l.code;
    btn.setAttribute('aria-label', `Show ${l.label} form table`);
    btn.onclick = () => switchLeague(l.code);
    groupBtns.appendChild(btn);
  });
  groupWrap.appendChild(groupBtns);
  tabsEl.appendChild(groupWrap);
});

switchLeague(currentLeague);

// Pre-warm rawCache for all leagues in the background after initial load
// so Best Bets loads instantly when user navigates there
async function preloadAllLeagues() {
  const asOf = getLeaguesAsOf();
  for (const { code } of LEAGUES) {
    const rawCached = Object.keys(rawCache).some(k => k.startsWith(code + '_s'));
    if (rawCached) continue;
    try { await loadLeague(code, asOf); } catch { /* silent fail */ }
  }
}
// Start preloading after initial league has rendered
setTimeout(preloadAllLeagues, 3000);
