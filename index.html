<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Form Table</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #141414;
      --surface2:  #1c1c1c;
      --border:    rgba(255,255,255,0.08);
      --border2:   rgba(255,255,255,0.14);
      --text:      #f0f0ee;
      --muted:     #888;
      --accent:    #c8f04a;
      --accent-fg: #0d0d0d;
      --win:       #4ade80;
      --draw:      #888;
      --loss:      #f87171;
      --font:      'Inter', system-ui, sans-serif;
      --mono:      'IBM Plex Mono', monospace;
      --radius:    6px;
      --radius-lg: 10px;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Layout ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text);
    }
    header span {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem 2rem 4rem;
    }

    /* ── League tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .tab {
      padding: 5px 13px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .tab:hover { border-color: var(--border2); color: var(--text); }
    .tab.active {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
      font-weight: 600;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-bottom: 1.25rem;
      min-height: 22px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }
    .swatch {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 7px 10px;
      color: var(--muted);
      font-weight: 400;
      font-size: 11px;
      font-family: var(--mono);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    th.r, td.r { text-align: right; }
    td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 0;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .col-rank  { width: 32px; }
    .col-team  { width: 170px; min-width: 130px; }
    .col-pts   { width: 44px; }
    .col-wdl   { width: 36px; }
    .col-form  { width: 100px; }
    .col-fix   { width: auto; min-width: 180px; }

    .rank { color: var(--muted); font-family: var(--mono); font-size: 11px; }
    .team-name { font-weight: 500; color: var(--text); }
    .pts-val { font-family: var(--mono); font-weight: 600; color: var(--accent); }
    .wdl-val { font-family: var(--mono); color: var(--muted); font-size: 12px; }

    /* ── Form dots ── */
    .dots { display: flex; gap: 3px; align-items: center; }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-w { background: var(--win); }
    .dot-d { background: var(--draw); }
    .dot-l { background: var(--loss); }

    /* ── Fixture badge ── */
    .fix-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 500;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .fix-ha {
      font-size: 10px;
      opacity: 0.7;
      font-weight: 400;
    }

    /* ── Form key ── */
    .form-key {
      display: flex;
      gap: 12px;
      margin-bottom: 1rem;
      font-size: 11px;
      color: var(--muted);
    }
    .form-key-item { display: flex; align-items: center; gap: 5px; }

    /* ── Status / error ── */
    .status {
      padding: 2rem 0;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      padding: 1rem;
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: var(--radius-lg);
      color: var(--loss);
      font-size: 13px;
      background: rgba(248,113,113,0.05);
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1rem 2rem;
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 4px;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 1rem; }
      .container { padding: 1rem 1rem 3rem; }
      footer { padding: 1rem; }
      .col-team { width: 120px; }
      .col-wdl { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .spinner { animation: none; opacity: 0.5; }
    }
  </style>
</head>
<body>

<header>
  <h1>Football Form Table</h1>
  <span>Last 8 matches · Top 5 European leagues</span>
</header>

<main class="container">
  <div class="tabs" id="tabs"></div>
  <div class="form-key">
    <span class="form-key-item"><span class="dot dot-w"></span> Win</span>
    <span class="form-key-item"><span class="dot dot-d"></span> Draw</span>
    <span class="form-key-item"><span class="dot dot-l"></span> Loss</span>
    <span style="margin-left:4px">· Sorted by form points (last 8)</span>
  </div>
  <div class="legend" id="legend"></div>
  <div id="content">
    <div class="status"><span class="spinner"></span> Loading data…</div>
  </div>
</main>

<footer>
  <span>Data: football-data.org</span>
  <span id="last-updated"></span>
</footer>

<script>
const API_KEY = '59c26c14f9154e798468aef0c267f0ad';
const BASE    = 'https://api.football-data.org/v4';

const LEAGUES = [
  { code: 'PL',  label: 'Premier League' },
  { code: 'PD',  label: 'La Liga'        },
  { code: 'BL1', label: 'Bundesliga'     },
  { code: 'SA',  label: 'Serie A'        },
  { code: 'FL1', label: 'Ligue 1'        },
];

const PAIR_COLORS = [
  { bg: 'rgba(199,232,255,0.18)', border: 'rgba(199,232,255,0.35)', text: '#9ecff5' },
  { bg: 'rgba(212,247,224,0.18)', border: 'rgba(212,247,224,0.35)', text: '#7de0a8' },
  { bg: 'rgba(252,232,208,0.18)', border: 'rgba(252,232,208,0.35)', text: '#f0b97a' },
  { bg: 'rgba(240,216,251,0.18)', border: 'rgba(240,216,251,0.35)', text: '#d098f0' },
  { bg: 'rgba(255,214,214,0.18)', border: 'rgba(255,214,214,0.35)', text: '#f09090' },
  { bg: 'rgba(213,245,240,0.18)', border: 'rgba(213,245,240,0.35)', text: '#6edcc8' },
  { bg: 'rgba(255,243,196,0.18)', border: 'rgba(255,243,196,0.35)', text: '#e6c85a' },
  { bg: 'rgba(252,220,233,0.18)', border: 'rgba(252,220,233,0.35)', text: '#f0a0c0' },
  { bg: 'rgba(220,232,252,0.18)', border: 'rgba(220,232,252,0.35)', text: '#94b8e8' },
  { bg: 'rgba(232,244,208,0.18)', border: 'rgba(232,244,208,0.35)', text: '#a8d460' },
];

let current = 'PL';
const cache  = {};

async function apiFetch(path) {
  const res = await fetch(BASE + path, { headers: { 'X-Auth-Token': API_KEY } });
  if (!res.ok) throw new Error(`API returned ${res.status} for ${path}`);
  return res.json();
}

async function loadLeague(code) {
  if (cache[code]) return cache[code];

  const [standData, matchData, fixtureData] = await Promise.all([
    apiFetch(`/competitions/${code}/standings`),
    apiFetch(`/competitions/${code}/matches?status=FINISHED&limit=100`),
    apiFetch(`/competitions/${code}/matches?status=SCHEDULED&limit=50`),
  ]);

  const teams = standData.standings[0].table.map(row => ({
    id:      row.team.id,
    name:    row.team.shortName || row.team.name,
    pts:     row.points,
    played:  row.playedGames,
    results: [],
    formPts: 0,
    formW:   0,
    formD:   0,
    formL:   0,
  }));

  const teamMap = Object.fromEntries(teams.map(t => [t.id, t]));

  const finished = (matchData.matches || [])
    .sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate));

  for (const m of finished) {
    const h  = teamMap[m.homeTeam.id];
    const a  = teamMap[m.awayTeam.id];
    const hg = m.score?.fullTime?.home;
    const ag = m.score?.fullTime?.away;
    if (!h || !a || hg === null || hg === undefined) continue;
    if (h.results.length < 8) h.results.push(hg > ag ? 'W' : hg < ag ? 'L' : 'D');
    if (a.results.length < 8) a.results.push(ag > hg ? 'W' : ag < hg ? 'L' : 'D');
  }

  for (const t of teams) {
    for (const r of t.results) {
      if (r === 'W') { t.formPts += 3; t.formW++; }
      else if (r === 'D') { t.formPts += 1; t.formD++; }
      else t.formL++;
    }
  }

  const upcoming  = (fixtureData.matches || [])
    .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

  const nextRound = {};
  const seen      = new Set();
  for (const m of upcoming) {
    const hid = m.homeTeam.id, aid = m.awayTeam.id;
    if (seen.has(hid) || seen.has(aid)) continue;
    if (teamMap[hid] && teamMap[aid]) {
      nextRound[hid] = { opp: aid, home: true,  date: m.utcDate };
      nextRound[aid] = { opp: hid, home: false, date: m.utcDate };
      seen.add(hid); seen.add(aid);
    }
  }

  const data = { teams, teamMap, nextRound, fetched: new Date() };
  cache[code] = data;
  return data;
}

function render(code, data) {
  const { teams, teamMap, nextRound } = data;
  const sorted = [...teams].sort((a, b) => b.formPts - a.formPts || b.pts - a.pts);

  /* assign fixture pair colors */
  const pairColor = {};
  const legendPairs = [];
  const usedPairs   = new Set();
  let ci = 0;
  for (const [tidStr, fix] of Object.entries(nextRound)) {
    const tid = +tidStr;
    const key = [tid, fix.opp].sort().join('-');
    if (usedPairs.has(key)) continue;
    usedPairs.add(key);
    const c = PAIR_COLORS[ci % PAIR_COLORS.length];
    pairColor[tid]    = c;
    pairColor[fix.opp] = c;
    const t1 = teamMap[tid], t2 = teamMap[fix.opp];
    if (t1 && t2) legendPairs.push({ label: `${t1.name} v ${t2.name}`, c });
    ci++;
  }

  /* legend */
  document.getElementById('legend').innerHTML = legendPairs.map(({ label, c }) =>
    `<span class="legend-item">
       <span class="swatch" style="background:${c.text}"></span>${label}
     </span>`
  ).join('');

  /* table */
  const rows = sorted.map((t, i) => {
    const dots = [...t.results].reverse().map(r => {
      const cls = r === 'W' ? 'dot-w' : r === 'D' ? 'dot-d' : 'dot-l';
      const label = r === 'W' ? 'Win' : r === 'D' ? 'Draw' : 'Loss';
      return `<span class="dot ${cls}" title="${label}" aria-label="${label}"></span>`;
    }).join('');

    let badge = '<span style="color:var(--muted)">—</span>';
    const fix = nextRound[t.id];
    const c   = pairColor[t.id];
    if (fix && c) {
      const opp = teamMap[fix.opp];
      if (opp) {
        const ha      = fix.home ? 'H' : 'A';
        const dateStr = new Date(fix.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        badge = `<span class="fix-badge" style="background:${c.bg};border-color:${c.border};color:${c.text}">
          <span class="fix-ha">${ha}</span>${opp.name}<span class="fix-ha">· ${dateStr}</span>
        </span>`;
      }
    }

    return `<tr>
      <td class="col-rank"><span class="rank">${i + 1}</span></td>
      <td class="col-team"><span class="team-name">${t.name}</span></td>
      <td class="col-pts r"><span class="pts-val">${t.formPts}</span></td>
      <td class="col-wdl r"><span class="wdl-val">${t.formW}</span></td>
      <td class="col-wdl r"><span class="wdl-val">${t.formD}</span></td>
      <td class="col-wdl r"><span class="wdl-val">${t.formL}</span></td>
      <td class="col-form"><div class="dots">${dots || '<span style="color:var(--muted);font-size:11px">no data</span>'}</div></td>
      <td class="col-fix">${badge}</td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="col-rank">#</th>
            <th class="col-team">Team</th>
            <th class="col-pts r" title="Form points from last 8 matches">Pts</th>
            <th class="col-wdl r">W</th>
            <th class="col-wdl r">D</th>
            <th class="col-wdl r">L</th>
            <th class="col-form">Last 8</th>
            <th class="col-fix">Next fixture</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  document.getElementById('last-updated').textContent =
    'Updated ' + data.fetched.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

async function switchLeague(code) {
  current = code;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.code === code)
  );
  if (!cache[code]) {
    document.getElementById('content').innerHTML =
      '<div class="status"><span class="spinner"></span> Loading data…</div>';
  }
  try {
    const data = await loadLeague(code);
    render(code, data);
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="error">
        <strong>Couldn't load data.</strong><br>
        ${e.message}<br><br>
        Check that your API key is valid and that you haven't hit the rate limit (10 req/min on the free tier).
       </div>`;
  }
}

/* build tabs */
const tabsEl = document.getElementById('tabs');
LEAGUES.forEach(l => {
  const btn = document.createElement('button');
  btn.className    = 'tab' + (l.code === current ? ' active' : '');
  btn.textContent  = l.label;
  btn.dataset.code = l.code;
  btn.setAttribute('aria-label', `Show ${l.label} form table`);
  btn.onclick = () => switchLeague(l.code);
  tabsEl.appendChild(btn);
});

switchLeague(current);
</script>
</body>
</html>
